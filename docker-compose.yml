networks:
  internal:
    external: true
    name: "internal"

services:
  database:
    container_name: agon-postgres
    image: postgres:15-alpine
    restart: unless-stopped
    networks:
      - "internal"
    volumes:
      - agon-data:/data
    environment:
      - PGDATA=/data/postgres
      - POSTGRES_DB=agon
      - POSTGRES_USER=agon
      - POSTGRES_PASSWORD=PgAg0n_K7xM2pV9qW3rS_t5uL8nBc
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agon -d agon"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    container_name: agon-data
    image: ghcr.io/shredness/rd-tracker-backend:latest
    restart: unless-stopped
    networks:
      - "internal"
    environment:
      - DATABASE_URL=postgresql://agon:PgAg0n_K7xM2pV9qW3rS_t5uL8nBc@agon-postgres:5432/agon
      - SECRET_KEY=f7K#mP2$nX9qRvL4wZ8jYtB6cHsE3uA5dGiNpW1oF0yCkVbMeQhTxJlUzDrS
      - ALLOWED_ORIGINS=https://agon.savo.us,http://localhost,http://localhost:3800
      - ALLOW_REGISTRATION=false
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    container_name: agon-ui
    image: ghcr.io/shredness/rd-tracker-frontend:latest
    restart: unless-stopped
    networks:
      - "internal"
    ports:
      - "3800:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  agon-data:
    external: true