<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Heatmap Alignment Matrix</title>
<style>
  :root {
    --bg: #111111;
    --text: #ffffff;
  }
  body {
    background-color: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, sans-serif;
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
  }

  /* 1. Lock the Parent */
  .anatomy-wrapper {
    position: relative;
    width: 100%;
    max-width: 500px; /* Set to your UI max-width constraint */
    border: 1px solid #333;
    border-radius: 8px;
    overflow: hidden;
  }

  /* 2. Sync the Aspect Ratio */
  .anatomy-wrapper svg {
    width: 100%;
    height: auto;
    display: block;
    /* preserveAspectRatio="xMidYMid meet" is critical on the inline SVG tag */
  }

  /* 3. Overlay Layer */
  #heatmap-layer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none; /* Let clicks pass to SVG */
  }

  /* Dynamic Heat Point */
  .heat-point {
    position: absolute;
    background: radial-gradient(circle, rgba(255, 69, 58, 0.9) 0%, rgba(255, 69, 58, 0) 70%);
    border-radius: 50%;
    transform: translate(-50%, -50%); /* Anchor dead center to calculated coordinate */
    transition: opacity 0.2s ease;
  }
</style>
</head>
<body>

<div class="anatomy-wrapper" id="wrapper">
  <!-- Ensure your chest2.svg has a defined viewBox and preserveAspectRatio -->
  <svg id="chest-svg" viewBox="0 0 500 500" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
    <!-- Placeholder geometry simulating your chest2.svg -->
    <path d="M 120 100 C 120 40, 380 40, 380 100 C 450 250, 420 450, 250 480 C 80 450, 50 250, 120 100 Z" fill="#222" stroke="#555" stroke-width="2"/>
    <!-- Visual reference targets (e.g. Left Pec, Right Pec, Sternum) -->
    <circle cx="180" cy="220" r="4" fill="#666" /> 
    <circle cx="320" cy="220" r="4" fill="#666" />
    <circle cx="250" cy="300" r="4" fill="#666" />
  </svg>
  
  <div id="heatmap-layer"></div>
</div>

<script>
  const svg = document.getElementById('chest-svg');
  const heatmapLayer = document.getElementById('heatmap-layer');

  // Your raw target data coordinates mapped to the original SVG viewBox (500x500)
  const heatData = [
    { x: 180, y: 220, intensity: 1.0, radius: 80 }, // Left Pec
    { x: 320, y: 220, intensity: 0.8, radius: 80 }, // Right Pec
    { x: 250, y: 300, intensity: 0.6, radius: 60 }  // Lower Sternum
  ];

  function syncHeatmap() {
    heatmapLayer.innerHTML = ''; 
    
    // Extract the Current Transform Matrix (CTM)
    // This matrix contains the exact math the browser is using to scale/translate the SVG
    const ctm = svg.getScreenCTM();
    if (!ctm) return;
    
    const wrapperRect = heatmapLayer.getBoundingClientRect();

    heatData.forEach(point => {
      // 1. Create native SVG point
      let pt = svg.createSVGPoint();
      pt.x = point.x;
      pt.y = point.y;

      // 2. Project coordinate through the CTM to get physical screen pixels
      let screenPt = pt.matrixTransform(ctm);
      
      // 3. Normalize against the wrapper's offset to get local relative positioning
      let relativeX = screenPt.x - wrapperRect.left;
      let relativeY = screenPt.y - wrapperRect.top;

      // 4. Calculate dynamic scale (ctm.a is the X-axis scale factor)
      const scale = ctm.a;
      const scaledSize = point.radius * scale;

      // 5. Inject DOM element
      const dot = document.createElement('div');
      dot.className = 'heat-point';
      dot.style.left = `${relativeX}px`;
      dot.style.top = `${relativeY}px`;
      dot.style.width = `${scaledSize}px`;
      dot.style.height = `${scaledSize}px`;
      dot.style.opacity = point.intensity;

      heatmapLayer.appendChild(dot);
    });
  }

  // Initialize and bind to resize loop
  window.addEventListener('resize', syncHeatmap);
  
  // Ensure layout is settled before first calculation
  requestAnimationFrame(syncHeatmap);
</script>
</body>
</html>
