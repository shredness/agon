server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Rate-limited auth endpoints (login, register) — 10 req/min per IP
    location ~ ^/api/auth/(login|register)$ {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://backend:8000/auth/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # Rate-limited external data endpoint — 30 req/min per IP
    location = /api/external/data {
        limit_req zone=external_limit burst=10 nodelay;
        proxy_pass http://backend:8000/external/data;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # API proxy
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # Service worker — must not be cached by browser
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Manifest — short cache
    location = /manifest.json {
        add_header Cache-Control "public, max-age=3600";
    }

    # Icons — long cache (versioned by filename)
    location ~* \.(png|ico)$ {
        add_header Cache-Control "public, max-age=604800";
    }

    # Everything else
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
}
